<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora — Personal Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@200;300;400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ─────────────────────────────────────────────────────────────────────────
     ROOT
  ───────────────────────────────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #ffffff;
    --ink-dim: rgba(255,255,255,0.45);
    --ink-faint: rgba(255,255,255,0.22);
    --hair: rgba(255,255,255,0.12);
    --hair-strong: rgba(255,255,255,0.24);
    --pink: #ff8aa6;
    --peach: #ffd1b8;
    --mint: #b8f5d1;
    --lilac: #c4b8ff;
    --gold: #f5d990;
  }
  html, body {
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse at 50% 30%, #14143F 0%, #0A0A36 55%, #050524 100%);
    color: var(--ink);
    font-family: 'Urbanist', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    cursor: default;
  }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  /* ─────────────────────────────────────────────────────────────────────────
     DOT MATRIX CANVAS (z=0)
  ───────────────────────────────────────────────────────────────────────── */
  #matrix {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0; display: block;
  }
  .vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(80% 70% at 50% 35%, transparent 0%, rgba(0,0,0,0.55) 95%),
      radial-gradient(50% 40% at 50% 100%, rgba(0,0,0,0.6), transparent 70%);
  }

  /* ─────────────────────────────────────────────────────────────────────────
     UI LAYER
  ───────────────────────────────────────────────────────────────────────── */
  .ui {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
  }
  .ui > * { pointer-events: auto; }
  body.active .top-bar,
  body.active .chat-rail,
  body.active .top-right,
  body.active .top-left {
    opacity: 0;
    pointer-events: none;
    transition: opacity 600ms ease;
  }
  body.active .chat-bar {
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(40px);
    transition: opacity 500ms, transform 600ms cubic-bezier(.2,.7,.2,1);
  }
  body.active .footer-info {
    opacity: 0;
    transition: opacity 400ms;
  }

  /* Back arrow shown in voice mode */
  .back-btn {
    position: absolute;
    top: 28px; left: 28px;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px 12px 14px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 0.5px solid var(--hair-strong);
    border-radius: 999px;
    color: var(--ink);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-12px);
    transition: opacity 500ms 400ms, transform 600ms 400ms cubic-bezier(.2,.7,.2,1);
    z-index: 5;
  }
  body.active .back-btn {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .back-btn:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.35); }
  .back-btn svg { width: 16px; height: 16px; }
  .back-btn .label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* In voice mode, status pill stays subtle */
  body.active .status {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
  }

  /* ─────────────────────────────────────────────────────────────────────────
     TOP BAR (meta strip + profile)
  ───────────────────────────────────────────────────────────────────────── */
  .top-bar {
    position: absolute;
    top: 22px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 18px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 18px rgba(255,255,255,0.35);
    opacity: 0;
    animation: fadeIn 1.4s 0.4s forwards;
    transition: opacity 400ms;
  }
  .top-bar .sep {
    width: 18px; height: 0.5px; background: rgba(255,255,255,0.5);
  }
  .top-bar .live {
    color: #ffffff;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .top-bar .live::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: #871A11; box-shadow: 0 0 10px #871A11;
    animation: livePulse 2.2s ease-in-out infinite;
  }
  @keyframes livePulse { 0%,100% { opacity: 0.55 } 50% { opacity: 1 } }
  @keyframes fadeIn { to { opacity: 1 } }

  .top-left {
    position: absolute; top: 22px; left: 28px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0; animation: fadeIn 1.4s 0.4s forwards;
  }
  .rail-toggle { width: 32px; height: 32px; }
  body.rail-hidden .chat-rail {
    transform: translateX(-280px);
    opacity: 0;
    pointer-events: none;
  }
  .chat-rail {
    transition: transform 400ms cubic-bezier(.2,.7,.2,1), opacity 360ms;
  }
  .logo-mark {
    position: relative;
    width: 28px; height: 28px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .logo-mark .pip {
    width: 8px; height: 8px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 14px rgba(255,255,255,0.9);
    animation: breathePip 2.6s ease-in-out infinite;
  }
  .logo-mark .ring {
    position: absolute; inset: 0;
    border: 0.5px solid rgba(255,255,255,0.30);
    border-radius: 50%;
    animation: ringExp 2.6s ease-out infinite;
  }
  .logo-mark .ring.d { animation-delay: 1.3s; }
  .logo-text { line-height: 1.1; }
  .logo-text b { font-weight: 500; font-size: 14px; letter-spacing: 0.04em; }
  .logo-text small {
    display: block; font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-dim);
  }

  .top-right {
    position: absolute; top: 22px; right: 28px;
    display: flex; align-items: center; gap: 10px;
    opacity: 0; animation: fadeIn 1.4s 0.6s forwards;
    transition: opacity 400ms;
  }
  .pro-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: linear-gradient(135deg, rgba(255,138,166,0.18), rgba(196,184,255,0.10));
    border: 0.5px solid rgba(255,138,166,0.35);
    border-radius: 999px;
    color: #ffd6e0;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.04em;
    box-shadow: 0 8px 24px rgba(255,138,166,0.12);
    cursor: pointer;
    transition: transform 180ms, box-shadow 180ms;
  }
  .pro-pill:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(255,138,166,0.22); }
  .pro-pill .star {
    width: 12px; height: 12px;
  }
  .icon-btn {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border-radius: 10px;
    background: rgba(255,255,255,0.045);
    border: 0.5px solid var(--hair);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    cursor: pointer;
    transition: background 180ms, border-color 180ms;
    color: var(--ink-dim);
  }
  .icon-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--hair-strong); color: var(--ink); }
  .icon-btn svg { width: 16px; height: 16px; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,138,166,0.7), rgba(196,184,255,0.3) 60%, transparent 100%),
      linear-gradient(135deg, #ff8aa6, #c4b8ff);
    border: 0.5px solid var(--hair-strong);
    box-shadow: 0 8px 24px rgba(196,184,255,0.18), inset 0 0.5px 0 rgba(255,255,255,0.3);
    display: grid; place-items: center;
    font-weight: 600; font-size: 13px;
    color: rgba(0,0,0,0.55);
    cursor: pointer;
    position: relative;
  }
  .avatar::after {
    content: ""; position: absolute; bottom: -1px; right: -1px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #6ee7a7; box-shadow: 0 0 6px #6ee7a7;
    border: 2px solid #000;
  }

  /* ─────────────────────────────────────────────────────────────────────────
     CHAT HISTORY RAIL (left)
  ───────────────────────────────────────────────────────────────────────── */
  .chat-rail {
    position: absolute;
    top: 80px; bottom: 110px;
    left: 28px;
    width: 248px;
    display: flex; flex-direction: column;
    gap: 10px;
    opacity: 0; animation: fadeIn 1.4s 0.9s forwards;
    transition: opacity 400ms;
  }
  .rail-card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--hair);
    border-radius: 16px;
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.12);
    padding: 14px;
    flex-shrink: 0;
  }
  .rail-card h3 {
    font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-dim);
    font-weight: 500;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .rail-card h3 span.count {
    color: var(--ink-faint);
  }
  .new-chat {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid var(--hair-strong);
    color: var(--ink);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 160ms;
    width: 100%;
  }
  .new-chat:hover { background: rgba(255,255,255,0.10); }
  .new-chat .pp { width: 18px; height: 18px; }

  .history {
    overflow-y: auto;
    flex: 1;
    display: flex; flex-direction: column; gap: 4px;
    padding-top: 4px;
  }
  .history::-webkit-scrollbar { width: 4px; }
  .history::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 2px; }

  .h-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px;
    border-radius: 9px;
    color: var(--ink-dim);
    font-size: 12.5px;
    cursor: pointer;
    transition: background 140ms, color 140ms;
    text-align: left;
    background: transparent;
    border: none;
    width: 100%;
  }
  .h-item:hover { background: rgba(255,255,255,0.045); color: var(--ink); }
  .h-item.active {
    background: rgba(255,255,255,0.07);
    color: var(--ink);
  }
  .h-item .dotmark {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ink-faint);
    flex-shrink: 0;
  }
  .h-item.active .dotmark { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.8); }
  .h-item .label {
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .h-item .when {
    font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .h-divider {
    font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-faint);
    padding: 10px 10px 4px;
  }


  /* ─────────────────────────────────────────────────────────────────────────
     WIDGET SHELF — minimal (2 widgets + add button), top-right of center
  ───────────────────────────────────────────────────────────────────────── */
  .widgets {
    position: absolute;
    top: 80px;
    right: 28px;
    display: flex;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 1.4s 0.7s forwards;
    transition: opacity 400ms;
    z-index: 2;
  }
  body.active .widgets {
    opacity: 0;
    pointer-events: none;
    transition: opacity 600ms ease;
  }
  .widget {
    width: 170px;
    min-height: 132px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid var(--hair-strong);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.20),
      inset 0 -0.5px 0 rgba(255,255,255,0.04),
      0 20px 60px rgba(0,0,0,0.55);
    padding: 14px;
    position: relative;
    overflow: hidden;
    transition: transform 240ms cubic-bezier(.2,.7,.2,1), border-color 200ms;
    color: #fff;
  }
  .widget:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.40); }
  .widget .w-close {
    position: absolute; top: 8px; right: 8px;
    width: 18px; height: 18px;
    display: grid; place-items: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 11px; line-height: 1;
    opacity: 0;
    transition: opacity 180ms;
    cursor: pointer;
    border: none;
  }
  .widget:hover .w-close { opacity: 1; }
  .widget .w-close:hover { background: rgba(255,255,255,0.18); }
  .w-label {
    font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    display: flex; align-items: center; gap: 6px;
  }
  .w-weather { background:
    linear-gradient(180deg, rgba(196,184,255,0.10), rgba(196,184,255,0.02)),
    rgba(255,255,255,0.04); }
  .w-weather .big {
    font-size: 44px; font-weight: 200;
    letter-spacing: -0.04em;
    margin-top: 6px; line-height: 1.05;
  }
  .w-weather .sub {
    font-size: 11.5px; color: rgba(255,255,255,0.65);
    margin-top: 2px;
  }
  .w-weather .hours {
    margin-top: 14px;
    display: flex; justify-content: space-between; gap: 6px;
  }
  .w-weather .hours .h {
    flex: 1; text-align: center;
    font-family: 'Geist Mono', monospace;
    font-size: 10px; color: rgba(255,255,255,0.55);
    display: flex; flex-direction: column; gap: 3px;
  }
  .w-weather .hours .h .v { color: #fff; font-size: 11px; }
  .w-weather .glyph {
    position: absolute; top: 12px; right: 14px;
    width: 22px; height: 22px; opacity: 0.7;
  }
  .w-cal .month {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
  }
  .w-cal .date {
    font-size: 50px; font-weight: 200;
    letter-spacing: -0.05em;
    line-height: 1; margin-top: 2px;
  }
  .w-cal .day {
    margin-top: 4px;
    font-size: 12px; color: rgba(255,255,255,0.65);
  }
  .w-cal .events {
    margin-top: 10px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .w-cal .events .e {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: #fff;
  }
  .w-cal .events .e i {
    width: 3px; height: 3px; border-radius: 50%;
  }
  .w-cal .events .e .t {
    font-family: 'Geist Mono', monospace;
    font-size: 9.5px; color: rgba(255,255,255,0.55);
    margin-left: auto;
  }
  .w-add {
    width: 60px;
    min-height: 132px;
    border-radius: 18px;
    background: rgba(255,255,255,0.02);
    border: 0.5px dashed rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.55);
    display: grid; place-items: center;
    cursor: pointer;
    transition: background 180ms, color 180ms, border-color 180ms;
    padding: 0;
  }
  .w-add:hover { color: #fff; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.45); }
  .w-add svg { width: 18px; height: 18px; }

  /* History rail — close (swipe-left) button on the card itself */
  .rail-close {
    width: 22px; height: 22px;
    display: grid; place-items: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: none;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: background 160ms, color 160ms, transform 200ms;
  }
  .rail-close:hover { background: rgba(255,255,255,0.14); color: #fff; transform: translateX(-2px); }
  .rail-close svg { width: 12px; height: 12px; }

  /* ─────────────────────────────────────────────────────────────────────────
     CENTER STAGE — Dot title labels (already drawn on canvas)
     Just nothing here; canvas handles it.
  ───────────────────────────────────────────────────────────────────────── */

  /* ─────────────────────────────────────────────────────────────────────────
     BOTTOM: CHAT INPUT BAR
  ───────────────────────────────────────────────────────────────────────── */
  /* ─── FOCUS MODE (after first send — calm, zoomed reading state) ──── */
  #matrix, .vignette {
    transition: transform 1400ms cubic-bezier(.2,.7,.2,1), opacity 1400ms;
    transform-origin: 50% 50%;
  }
  body.focus-mode #matrix { transform: scale(1.06); }
  body.focus-mode .vignette {
    opacity: 1.2;
    background:
      radial-gradient(60% 50% at 50% 50%, transparent 0%, rgba(0,0,0,0.78) 95%),
      radial-gradient(50% 40% at 50% 100%, rgba(0,0,0,0.6), transparent 60%);
  }

  /* ─── CHAT THREAD ──────────────────────────────────────────────────── */
  .chat-thread {
    position: absolute;
    left: 50%;
    bottom: 110px;
    transform: translateX(-50%);
    width: min(780px, calc(100% - 320px));
    max-height: calc(100vh - 280px);
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 16px;
    overflow-y: auto;
    pointer-events: auto;
    z-index: 4;
    /* fade out top edge so messages dissolve into the dot field */
    mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
  }
  .chat-thread::-webkit-scrollbar { width: 4px; }
  .chat-thread::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 2px; }
  body.active .chat-thread {
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms;
  }

  .msg {
    max-width: 78%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: msgIn 600ms cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(14px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }

  .msg .who {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 12px rgba(255,255,255,0.45);
    padding: 0 4px;
  }
  .msg .who .pip-mini {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px rgba(255,255,255,0.9);
    margin-right: 8px;
    animation: livePulse 2.4s ease-in-out infinite;
    vertical-align: 1px;
  }
  .msg .bubble {
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.5;
    color: #ffffff;
    backdrop-filter: blur(34px) saturate(200%);
    -webkit-backdrop-filter: blur(34px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.55);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.6),
      inset 0 -0.5px 0 rgba(255,255,255,0.10),
      0 18px 40px rgba(0,0,0,0.45);
  }
  .msg.user .bubble {
    background: #D5D1D1;
    color: #0A0A36;
    border-radius: 18px 18px 4px 18px;
    border-color: rgba(213,209,209,0.95);
  }
  .msg.ai .bubble {
    background: rgba(213,209,209,0.94);
    color: #0A0A36;
    border-radius: 18px 18px 18px 4px;
    border-color: rgba(213,209,209,0.85);
  }

  /* typing indicator */
  .msg.ai.typing .bubble {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 16px 20px;
  }
  .msg.ai.typing .bubble i {
    display: block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
    animation: pipBlink 1.3s ease-in-out infinite;
  }
  .msg.ai.typing .bubble i:nth-child(2) { animation-delay: 0.18s; }
  .msg.ai.typing .bubble i:nth-child(3) { animation-delay: 0.36s; }

  .chat-bar {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: min(780px, calc(100% - 320px));
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px 10px 18px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(34px) saturate(200%);
    -webkit-backdrop-filter: blur(34px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.45);
    border-radius: 999px;
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.55),

<!-- DOT MATRIX ENGINE                                                       -->
<!-- ─────────────────────────────────────────────────────────────────────── -->
<script>
/* ─────────────────────────────────────────────────────────────────────────
   AURORA DOT MATRIX ENGINE
   - Ambient breathing grid background
   - Renders "23°" and weather subline as dot-cluster glyphs
   - On activate: dots stagger inward in a swirling 360° sweep,
     form a rotating 3D sphere with an inner counter-rotating ring,
     plus 2-3 small "planet" satellites orbiting outside
   - On deactivate: dots flow back outward
   - Spawns/despawns "drifting" dots: a few dots randomly appear/disappear
     to give the field a sense of living motion
───────────────────────────────────────────────────────────────────────── */

(() => {
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d', { alpha: true });

  // ── Tunables ─────────────────────────────────────────────────────────────
  const SPACING       = 18;     // base grid spacing px
  const DOT_R_AMB     = 1.2;    // ambient grid dot radius
  const DOT_R_TEXT    = 2.4;    // dot radius inside glyphs
  const DOT_R_ORB     = 2.6;    // orb dot radius (front face)
  const ALPHA_AMB     = 0.13;   // base ambient opacity
  const ALPHA_TEXT    = 1.0;
  const GLOW_BG       = 2;
  const GLOW_TEXT     = 8;
  const GLOW_ORB      = 14;
  const TRANSITION_MS = 1800;
  const Y_TEMP        = 0.40;
  const Y_SUB         = 0.58;

  // ── Public API exposed to UI ─────────────────────────────────────────────
  const Aurora = {
    activate, deactivate, toggle,
    pulse,         // stereo wave from a point
    pulseFromAll,  // simultaneous waves from all four edges
    spark,         // brief bright flash near a point
    state: () => mode,
  };
  window.Aurora = Aurora;

  // ── State ────────────────────────────────────────────────────────────────
  let W = 0, H = 0, DPR = 1;
  let dots = [];
  let maskTemp = null, maskSub = null;
  let mode = 'idle'; // idle | forming | orb | returning
  let transitionStart = 0;
  let pulses = [];   // {x, y, born, ttl, amp}
  let ghosts = [];   // transient sparkle dots {x, y, born, ttl, r}
  let planets = [];  // small orbiting satellites around the orb

  // ── Resize ───────────────────────────────────────────────────────────────
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    buildMasks();
    buildDots();
    buildPlanets();
  }

  // ── Text masks ───────────────────────────────────────────────────────────
  const MASK_SCALE = 2;
  function makeMask(text, fontPx, weight, yFrac, letterSpacingPx = 0) {
    const m = document.createElement('canvas');
    m.width  = Math.floor(W * MASK_SCALE);
    m.height = Math.floor(H * MASK_SCALE);
    const mctx = m.getContext('2d');
    mctx.scale(MASK_SCALE, MASK_SCALE);
    mctx.fillStyle = '#000';
    mctx.fillRect(0, 0, W, H);
    mctx.fillStyle = '#fff';
    mctx.font = `${weight} ${fontPx}px Urbanist, system-ui, sans-serif`;
    mctx.textAlign = 'center';
    mctx.textBaseline = 'middle';
    if (letterSpacingPx > 0) {
      const chars = [...text];
      const widths = chars.map(c => mctx.measureText(c).width);
      const total = widths.reduce((a, b) => a + b, 0) + letterSpacingPx * (chars.length - 1);
      let x = W / 2 - total / 2;
      for (let i = 0; i < chars.length; i++) {
        mctx.fillText(chars[i], x + widths[i] / 2, H * yFrac);
        x += widths[i] + letterSpacingPx;
      }
    } else {
      mctx.fillText(text, W / 2, H * yFrac);
    }
    return mctx.getImageData(0, 0, m.width, m.height);
  }
  function sampleMask(mask, x, y) {
    if (!mask) return false;
    const px = Math.floor(x * MASK_SCALE);
    const py = Math.floor(y * MASK_SCALE);
    if (px < 0 || py < 0 || px >= mask.width || py >= mask.height) return false;
    return mask.data[(py * mask.width + px) * 4] > 128;
  }
  function buildMasks() {
    // Text masks removed — no dot-matrix temperature on the field.
    // The background remains a pure breathing dot grid with stars.
    maskTemp = null;
    maskSub  = null;
  }

  // ── Dot grid + sphere targets ────────────────────────────────────────────
  function buildDots() {
    dots = [];
    const cols = Math.ceil(W / SPACING) + 2;
    const rows = Math.ceil(H / SPACING) + 2;
    for (let r = -1; r < rows; r++) {
      const xOff = (r % 2 === 0) ? 0 : SPACING * 0.5;
      for (let c = -1; c < cols; c++) {
        const x = c * SPACING + xOff;
        const y = r * SPACING;
        const inTemp = sampleMask(maskTemp, x, y);
        const inSub  = !inTemp && sampleMask(maskSub, x, y);
        dots.push({
          hx: x, hy: y,                                  // home
          phase: Math.random() * Math.PI * 2,
          speed: 0.4 + Math.random() * 0.7,
          delay: 0,                                       // per-dot stagger
          inTemp, inSub,
          isText: inTemp || inSub,
          sx: 0, sy: 0, sz: 0, R: 0,
          // travel angle for swirling
          swirl: Math.random() * 2 - 1,
          // ambient hue (just white but with tiny tint variance)
          tint: Math.random() < 0.04 ? 'tint' : 'white',
          // visibility — for dots that randomly disappear/reappear
          life: 1,
          lifeTarget: 1,
          lifeNext: 0,
        });
      }
    }
    assignSphereTargets();
    assignStagger();
  }

  // Fibonacci sphere — sorted by radial distance so dots collapse cleanly.
  function assignSphereTargets() {
    const cx = W / 2, cy = H / 2;
    const N = dots.length;
    const R = Math.min(W, H) * 0.22;
    const points = new Array(N);
    const phi = Math.PI * (Math.sqrt(5) - 1);
    for (let i = 0; i < N; i++) {
      const y = 1 - (i / Math.max(1, N - 1)) * 2;
      const rad = Math.sqrt(Math.max(0, 1 - y * y));
      const theta = phi * i;
      points[i] = { x: Math.cos(theta) * rad, y, z: Math.sin(theta) * rad };
    }
    const idx = dots.map((_, i) => i);
    idx.sort((a, b) => {
      const da = (dots[a].hx - cx) ** 2 + (dots[a].hy - cy) ** 2;
      const db = (dots[b].hx - cx) ** 2 + (dots[b].hy - cy) ** 2;
      return da - db;
    });
    for (let i = 0; i < N; i++) {
      const d = dots[idx[i]];
      const p = points[i];
      d.sx = p.x; d.sy = p.y; d.sz = p.z;
      d.R = R;
    }
  }

  // Stagger: dots further from center start later → spiral collapse
  function assignStagger() {
    const cx = W / 2, cy = H / 2;
    const maxD = Math.hypot(W, H) / 2;
    for (const d of dots) {
      const dist = Math.hypot(d.hx - cx, d.hy - cy);
      // 0 at center, 1 at corners — invert so corners go LAST (start later)
      d.delay = 0.05 + 0.55 * (dist / maxD);
    }
  }

  // ── Planets / satellites orbiting the sphere when active ────────────────
  function buildPlanets() {
    planets = [
      { angle: 0,           speed: 0.45, dist: 1.55, r: 6, alpha: 0.85, ringRot: 0.6, tilt: 0.1 },
      { angle: 1.2,         speed: 0.30, dist: 2.05, r: 4, alpha: 0.65, ringRot: -0.4, tilt: -0.2 },
      { angle: 2.6,         speed: 0.18, dist: 2.65, r: 8, alpha: 0.55, ringRot: 0.3, tilt: 0.25, hasRing: true },
    ];
  }

  // ── State transitions ────────────────────────────────────────────────────
  function activate() {
    if (mode === 'forming' || mode === 'orb') return;
    mode = 'forming';
    transitionStart = performance.now();
    document.body.classList.add('active');
    // emit a wave from the center
    pulses.push({ x: W/2, y: H/2, born: performance.now(), ttl: 1800, amp: 1 });
  }
  function deactivate() {
    if (mode === 'idle' || mode === 'returning') return;
    mode = 'returning';
    transitionStart = performance.now();
    document.body.classList.remove('active');
    pulses.push({ x: W/2, y: H/2, born: performance.now(), ttl: 1400, amp: 0.5 });
  }
  function toggle() {
    (mode === 'orb' || mode === 'forming') ? deactivate() : activate();
  }
  // pulse(x,y,amp) — emits TWO waves at the same time so the field always
  // ripples in stereo. The second wave fires slightly delayed (60ms) for depth.
  function pulse(x = W/2, y = H/2, amp = 0.7) {
    const now = performance.now();
    pulses.push({ x, y, born: now,        ttl: 1300, amp });
    pulses.push({ x, y, born: now + 60,   ttl: 1300, amp: amp * 0.85 });
  }
  // pulseFromAll() — emits waves from all four edges of the viewport at once,
  // so the field ripples inward from every direction.
  function pulseFromAll(amp = 0.55) {
    const now = performance.now();
    const points = [
      { x: W * 0.5, y: -20 },             // top
      { x: W * 0.5, y: H + 20 },          // bottom
      { x: -20,     y: H * 0.5 },         // left
      { x: W + 20,  y: H * 0.5 },         // right
    ];
    for (const p of points) {
      pulses.push({ x: p.x, y: p.y, born: now, ttl: 1400, amp });
    }
  }
  function spark(x = W/2, y = H/2, count = 14) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const d = 4 + Math.random() * 24;
      ghosts.push({
        x: x + Math.cos(a) * d,
        y: y + Math.sin(a) * d,
        vx: Math.cos(a) * (0.5 + Math.random() * 1.5),
        vy: Math.sin(a) * (0.5 + Math.random() * 1.5),
        born: performance.now(),
        ttl: 900 + Math.random() * 600,
        r: 1.6 + Math.random() * 1.8,
      });
    }
  }

  // ── Easing ───────────────────────────────────────────────────────────────
  const easeInOut = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

  // ── Render ───────────────────────────────────────────────────────────────
  let t0 = performance.now();
  let lastGhostSpawn = 0;
  function frame(now) {
    const t = (now - t0) / 1000;
    ctx.clearRect(0, 0, W, H);

    // Transition progress
    let p = 1;
    if (mode === 'forming' || mode === 'returning') {
      p = Math.min(1, (now - transitionStart) / TRANSITION_MS);
      if (p >= 1) mode = (mode === 'forming') ? 'orb' : 'idle';
    }
    const eased = easeInOut(p);
    // Global blend 0..1 — but each dot gets its own delayed version
    const globalMix =
      (mode === 'forming')   ? eased :
      (mode === 'orb')       ? 1 :
      (mode === 'returning') ? 1 - eased : 0;

    // 3D rotation when orb-ish
    const orbActive = globalMix > 0;
    const rotY = orbActive ? t * 0.30 : 0;
    const rotX = orbActive ? Math.sin(t * 0.22) * 0.20 : 0;
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

    const cx = W / 2, cy = H / 2;

    // Prune expired pulses/ghosts
    pulses = pulses.filter(pl => now - pl.born < pl.ttl);
    ghosts = ghosts.filter(g => now - g.born < g.ttl);

    // (temperature halo removed)
    // Halo behind the orb when active
    if (globalMix > 0.3) {
      const orbA = Math.min(1, (globalMix - 0.3) / 0.7);
      const R = Math.min(W, H) * 0.22;
      const grd = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, R * 2.5);
      grd.addColorStop(0,   `rgba(200,180,255,${0.10 * orbA})`);
      grd.addColorStop(0.3, `rgba(255,138,166,${0.05 * orbA})`);
      grd.addColorStop(1,   `rgba(255,255,255,0)`);
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    // ── Pulse waves (radial compression of nearby dots) ───────────────────
    function applyPulses(x, y) {
      let dx = 0, dy = 0, brightnessBoost = 0;
      for (const pl of pulses) {
        const age = (now - pl.born) / pl.ttl;
        const front = age * 760;            // wave front in px
        const vx = x - pl.x, vy = y - pl.y;
        const d = Math.hypot(vx, vy) || 1;
        const band = 50;
        if (d > front - band && d < front + band) {
          const k = 1 - Math.abs(d - front) / band;
          const fade = 1 - age;
          const push = k * 14 * pl.amp * fade;
          dx += (vx / d) * push;
          dy += (vy / d) * push;
          brightnessBoost += k * fade * 0.9;
        }
      }
      return { dx, dy, brightnessBoost };
    }

    // ── Random ghost dots (life events: appear / disappear briefly) ───────
    const _typing = document.body.classList.contains('typing');
    const _focus  = document.body.classList.contains('focus-mode');
    // In focus-mode no stars EVER spawn (until reload). Otherwise gate by typing.
    const _spawnGate = _focus ? Infinity : (_typing ? 320 : 70);
    if (!_focus && (now - lastGhostSpawn > _spawnGate)) {
      lastGhostSpawn = now;
      const n = _typing ? 1 : (1 + (Math.random() < 0.6 ? 1 : 0));
      for (let i = 0; i < n; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        ghosts.push({
          x, y, vx: 0, vy: 0,
          born: now, ttl: 1700 + Math.random() * 2400,
          r: 1.4 + Math.random() * 2.4,
          ambient: true,
        });
      }
    }

    // ── Draw all dots ─────────────────────────────────────────────────────
    for (let i = 0; i < dots.length; i++) {
      const d = dots[i];

      // Per-dot delayed mix (creates the staggered spiral collapse)
      // delay is 0..0.55 — re-scale globalMix so each dot starts at its delay
      let dotMix = 0;
      if (mode === 'forming') {
        const local = (eased - d.delay) / (1 - d.delay);
        dotMix = Math.max(0, Math.min(1, local));
        dotMix = easeInOut(dotMix);
      } else if (mode === 'orb') {
        dotMix = 1;
      } else if (mode === 'returning') {
        // reverse: corners return first
        const reverseDelay = 0.55 - d.delay;
        const local = (eased - reverseDelay) / (1 - reverseDelay);
        dotMix = 1 - Math.max(0, Math.min(1, local));
        dotMix = easeInOut(dotMix);
      }

      // Ambient breathing at home
      const driftX = Math.sin(d.phase + t * 0.5 * d.speed) * 1.1;
      const driftY = Math.cos(d.phase * 1.3 + t * 0.4 * d.speed) * 0.9;
      let hx = d.hx + driftX;
      let hy = d.hy + driftY;

      // Swirling tangential displacement during transition — feels classy 360°
      if (mode === 'forming' || mode === 'returning') {
        const vx = hx - cx, vy = hy - cy;
        const ang = Math.atan2(vy, vx);
        const distC = Math.hypot(vx, vy);
        // swirl wave — peaks mid-transition
        const swirlAmt = Math.sin(dotMix * Math.PI) * 28 * d.swirl;
        hx += Math.cos(ang + Math.PI / 2) * swirlAmt;
        hy += Math.sin(ang + Math.PI / 2) * swirlAmt;
        // tiny pull toward center as we form
        hx -= (vx / Math.max(1, distC)) * dotMix * 6;
        hy -= (vy / Math.max(1, distC)) * dotMix * 6;
      }

      // Pulse waves push the field
      const pl = applyPulses(hx, hy);
      hx += pl.dx; hy += pl.dy;

      // Sphere position
      let sx = d.sx, sy = d.sy, sz = d.sz;
      let xR = sx * cosY + sz * sinY;
      let zR = -sx * sinY + sz * cosY;
      sx = xR; sz = zR;
      let yR = sy * cosX - sz * sinX;
      zR    = sy * sinX + sz * cosX;
      sy = yR; sz = zR;
      const sxPx = cx + sx * d.R;
      const syPx = cy + sy * d.R;

      const x = hx + (sxPx - hx) * dotMix;
      const y = hy + (syPx - hy) * dotMix;

      // Home appearance
      let homeR, homeA, homeBlur;
      if (d.inTemp) {
        homeR = DOT_R_TEXT;
        homeA = ALPHA_TEXT;
        homeBlur = GLOW_TEXT;
      } else if (d.inSub) {
        homeR = DOT_R_TEXT * 0.6;
        homeA = 0.75;
        homeBlur = GLOW_TEXT * 0.55;
      } else {
        const breath = 0.85 + 0.15 * Math.sin(t * 0.7 + d.phase * 1.3);
        homeR = DOT_R_AMB;
        homeA = ALPHA_AMB * breath;
        homeBlur = GLOW_BG;
      }
      // Wave brightens dots a touch — "whiter" not "blinding"
      homeA = Math.min(1, homeA + pl.brightnessBoost * 0.45);

      // Orb appearance with depth
      const front = (1 - sz) * 0.5; // 0..1
      const orbR = DOT_R_ORB * (0.5 + front * 0.85);
      const orbA = 0.15 + front * 0.85;
      const orbBlur = 3 + front * GLOW_ORB;

      // Blend
      const radius = homeR + (orbR - homeR) * dotMix;
      const alpha  = Math.max(homeA * (1 - dotMix * 0.85), orbA * dotMix);
      const blur   = homeBlur + (orbBlur - homeBlur) * dotMix;

      const _fMode = document.body.classList.contains('focus-mode');
      // FOCUS MODE: same full grid, no glow. Slight bump to alpha + radius
      // so the dots read a touch more clearly without glowing.
      if (alpha < 0.01) continue;
      const finalR = _fMode ? Math.max(0.5, radius * 1.12) : Math.max(0.4, radius);
      const finalA = _fMode ? Math.min(1, alpha * 1.35) : alpha;

      const __calmDots = document.body.classList.contains('typing');
      ctx.shadowBlur  = _fMode ? 0 : (__calmDots ? Math.min(blur, 2) : blur);
      ctx.shadowColor = d.tint === 'tint' ? 'rgba(255,180,210,0.9)' : 'rgba(255,255,255,0.9)';
      ctx.fillStyle   = d.tint === 'tint'
        ? `rgba(255,210,225,${finalA.toFixed(3)})`
        : `rgba(255,255,255,${finalA.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(x, y, finalR, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── Ghost dots (transient sparkles) ───────────────────────────────────
    for (const g of ghosts) {
      const age = (now - g.born) / g.ttl;
      const a = Math.sin(age * Math.PI);
      g.x += g.vx; g.y += g.vy;
      const _calm = document.body.classList.contains('typing');
      // Glow reduced to almost nothing — stars are tiny pinpricks
      ctx.shadowBlur = _calm ? 0.3 : 1;
      ctx.shadowColor = 'rgba(255,255,255,0.6)';
      ctx.fillStyle = `rgba(255,255,255,${(a * (_calm ? 0.55 : 0.85)).toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.r * (_calm ? 0.7 : 0.85), 0, Math.PI * 2);
      ctx.fill();
      // Four-point cross glint kept very faint — just a hint
      if (!_calm && a > 0.7) {
        ctx.strokeStyle = `rgba(255,255,255,${((a - 0.7) * 0.4).toFixed(3)})`;
        ctx.lineWidth = 0.4;
        const armR = g.r * 2.2;
        ctx.beginPath();
        ctx.moveTo(g.x - armR, g.y); ctx.lineTo(g.x + armR, g.y);
        ctx.moveTo(g.x, g.y - armR); ctx.lineTo(g.x, g.y + armR);
        ctx.stroke();
      }
    }

    // ── Inner counter-rotating ring + planet satellites (orb mode) ────────
    if (globalMix > 0.4) {
      const orbA = Math.min(1, (globalMix - 0.4) / 0.6);
      const R = Math.min(W, H) * 0.22;

      // Inner counter-rotating dot ring (sits inside the sphere, on the
      // equator plane that's been rotated by -2*rotY for opposite motion)
      const innerR = R * 0.55;
      const innerRot = -t * 0.6;
      const innerCount = 64;
      for (let i = 0; i < innerCount; i++) {
        const ang = (i / innerCount) * Math.PI * 2 + innerRot;
        // place on equator of sphere, then rotate with rotX (just X tilt)
        let px = Math.cos(ang) * innerR;
        let py = 0;
        let pz = Math.sin(ang) * innerR;
        // X-tilt
        const yR = py * cosX - pz * sinX;
        const zR = py * sinX + pz * cosX;
        py = yR; pz = zR;
        // Y-rotation: opposite direction, slower
        const xR = px * Math.cos(-rotY * 2) + pz * Math.sin(-rotY * 2);
        const zR2 = -px * Math.sin(-rotY * 2) + pz * Math.cos(-rotY * 2);
        px = xR; pz = zR2;

        const f = (1 - pz / innerR) * 0.5; // 0..1 front
        const aR = 1.2 + f * 1.6;
        const aA = 0.20 + f * 0.65;
        ctx.shadowBlur = 6 + f * 8;
        ctx.shadowColor = 'rgba(255,210,225,0.9)';
        ctx.fillStyle = `rgba(255,220,235,${(aA * orbA).toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(cx + px, cy + py, aR, 0, Math.PI * 2);
        ctx.fill();
      }

      // Second inner ring — perpendicular axis
      const innerR2 = R * 0.38;
      const innerRot2 = t * 0.85;
      for (let i = 0; i < 48; i++) {
        const ang = (i / 48) * Math.PI * 2 + innerRot2;
        let px = Math.cos(ang) * innerR2;
        let py = Math.sin(ang) * innerR2;
        let pz = 0;
        // X tilt
        const yR = py * cosX - pz * sinX;
        const zR = py * sinX + pz * cosX;
        py = yR; pz = zR;
        // Y rotation
        const xR = px * cosY + pz * sinY;
        const zR2 = -px * sinY + pz * cosY;
        px = xR; pz = zR2;

        const f = (1 - pz / innerR2) * 0.5;
        const aA = 0.18 + f * 0.6;
        ctx.shadowBlur = 5 + f * 7;
        ctx.shadowColor = 'rgba(196,184,255,0.9)';
        ctx.fillStyle = `rgba(220,210,255,${(aA * orbA).toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(cx + px, cy + py, 1.6 + f * 1.6, 0, Math.PI * 2);
        ctx.fill();
      }

      // Planet satellites
      for (const planet of planets) {
        planet.angle += planet.speed * 0.012;
        // Orbit in tilted plane
        const a = planet.angle;
        let px = Math.cos(a) * R * planet.dist;
        let py = Math.sin(a) * planet.tilt * R;
        let pz = Math.sin(a) * R * planet.dist;
        // X tilt
        const yR = py * cosX - pz * sinX;
        const zR = py * sinX + pz * cosX;
        py = yR; pz = zR;
        const f = (1 - pz / (R * planet.dist)) * 0.5;
        const aA = planet.alpha * orbA * (0.5 + f * 0.5);
        // planet body — small soft glow
        ctx.shadowBlur = 16;
        ctx.shadowColor = 'rgba(255,210,225,0.85)';
        ctx.fillStyle = `rgba(255,220,235,${aA.toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(cx + px, cy + py, planet.r * (0.7 + f * 0.6), 0, Math.PI * 2);
        ctx.fill();
        // Saturn-style ring
        if (planet.hasRing) {
          ctx.shadowBlur = 6;
          ctx.strokeStyle = `rgba(255,220,235,${(aA * 0.6).toFixed(3)})`;
          ctx.lineWidth = 0.7;
          ctx.beginPath();
          ctx.ellipse(cx + px, cy + py, planet.r * 2.4, planet.r * 0.7, planet.tilt + Math.PI / 6, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    ctx.shadowBlur = 0;
    requestAnimationFrame(frame);
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  function start() {
    resize();
    requestAnimationFrame(frame);
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(start);
  } else {
    start();
  }
  window.addEventListener('resize', resize);
})();

</script>
<script>

const conversations = [
  { title: "Plan my evening in Soho",         when: "now",     active: true,  group: "today" },

  { title: "Birthday gift for mom",           when: "yest",    active: false, group: "yesterday" },
  { title: "Brainstorm — Aurora launch copy", when: "2d",      active: false, group: "previous" },
  { title: "Refactor the dot-matrix engine",  when: "3d",      active: false, group: "previous" },
  { title: "Translate Anaïs Nin journal",     when: "4d",      active: false, group: "previous" },
  { title: "Compare lenses · 35mm vs 50mm",   when: "1w",      active: false, group: "previous" },
  { title: "Therapy reflections",             when: "1w",      active: false, group: "previous" },
  { title: "Smart home — Hue scenes",         when: "2w",      active: false, group: "previous" },
  { title: "Spotify wrap-up summary",         when: "3w",      active: false, group: "previous" },
];

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  const groupLabels = {
    today: 'Today',
    yesterday: 'Yesterday',
    previous: 'Previous'
  };
  const groups = {};
  for (const c of conversations) {
    if (!groups[c.group]) groups[c.group] = [];
    groups[c.group].push(c);
  }
  for (const key of ['today', 'yesterday', 'previous']) {
    if (!groups[key]) continue;
    const div = document.createElement('div');
    div.className = 'h-divider';
    div.textContent = groupLabels[key];
    list.appendChild(div);
    for (const c of groups[key]) {
      const btn = document.createElement('button');
      btn.className = 'h-item' + (c.active ? ' active' : '');
      btn.innerHTML = `
        <span class="dotmark"></span>
        <span class="label">${c.title}</span>
        <span class="when">${c.when}</span>
      `;
      btn.addEventListener('click', () => {
        conversations.forEach(x => x.active = false);
        c.active = true;
        renderHistory();
        // little pulse when picking a conversation
        if (window.Aurora) window.Aurora.pulse(60, 80, 0.4);
      });
      list.appendChild(btn);
    }
  }
  document.getElementById('hCount').textContent = String(conversations.length);
}
renderHistory();

document.getElementById('newChat').addEventListener('click', () => {
  conversations.forEach(x => x.active = false);
  conversations.unshift({

    group: 'today'
  });

});

    w.style.transition = 'transform 320ms cubic-bezier(.2,.7,.2,1), opacity 320ms';

      const r = w.getBoundingClientRect();
      window.Aurora.spark(r.left + r.width / 2, r.top + r.height / 2, 12);

});
const addBtn = document.getElementById('addWidget');
let extraCount = 0;
const extras = [
  { title: 'Markets',     value: '+1.42%',  sub: 'NASDAQ',     color: '#b8f5d1' },
  { title: 'Sleep',       value: '7h 12m',  sub: 'Last night', color: '#c4b8ff' },
  { title: 'Air Quality', value: '24',      sub: 'Good',       color: '#ffd1b8' },

  { title: 'Now playing', value: 'Solar Glide', sub: 'Yumi Zouma', color: '#ff8aa6' },
];
addBtn.addEventListener('click', () => {
  const extra = extras[extraCount % extras.length];
  extraCount++;
  const w = document.createElement('div');
  w.className = 'widget';
  w.innerHTML = `
    <button class="w-close" aria-label="Remove">×</button>
    <div class="w-label">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${extra.color};margin-right:4px;"></span>

    <div style="font-size:36px;font-weight:200;letter-spacing:-0.03em;margin-top:8px;line-height:1;">${extra.value}</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:6px;">${extra.sub}</div>
    <div style="margin-top:14px;display:flex;gap:3px;align-items:end;height:18px;">
      ${Array.from({length: 14}).map((_, i) =>
        `<i style="flex:1;background:${extra.color};opacity:0.65;height:${30 + Math.sin(i*1.4)*30 + Math.random()*40}%;border-radius:1px;"></i>`
      ).join('')}
    </div>
  `;
  w.style.opacity = '0';
  w.style.transform = 'translateY(12px)';
  widgets.insertBefore(w, addBtn);
  requestAnimationFrame(() => {
    w.style.transition = 'transform 360ms cubic-bezier(.2,.7,.2,1), opacity 360ms';
    w.style.opacity = '1';
    w.style.transform = 'translateY(0)';
  });
  if (window.Aurora) {
    const r = w.getBoundingClientRect();
    window.Aurora.spark(r.left + r.width / 2, r.top + r.height / 2, 14);
  }
});

// ─── Rail close (swipe-left) inside the Conversations card ─────────────
document.querySelectorAll('.rail-close').forEach(btn => {
  btn.addEventListener('click', () => {
    document.body.classList.add('rail-hidden');
  });
});


// ─── Talking orb: while voice mode is active, periodically pulse the orb
// outward in a wave so the field reads as "talking" ─────────────────────
let talkTimer = null;
function startTalking() {
  if (talkTimer) return;
  const tick = () => {
    if (!document.body.classList.contains('active')) {
      talkTimer = null;
      return;
    }
    if (window.Aurora) {
      window.Aurora.pulse(window.innerWidth / 2, window.innerHeight / 2, 0.55);
    }
    // randomised cadence — feels like speech rhythm
    talkTimer = setTimeout(tick, 900 + Math.random() * 1600);
  };
  tick();
}

// Watch body class to start/stop talking pulses
const bodyObs = new MutationObserver(() => {
  if (document.body.classList.contains('active')) {
    startTalking();
  }
});
bodyObs.observe(document.body, { attributes: true, attributeFilter: ['class'] });


window.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'a' && document.activeElement !== input) {
    e.preventDefault();
    if (window.Aurora) window.Aurora.toggle();
  }
  if (e.key === 'Escape' && window.Aurora && window.Aurora.state() !== 'idle') {
    window.Aurora.deactivate();
  }
});

// ─── Send a message ───────────────────────────────────────────────────────
// ─── Chat thread message system ────────────────────────────────────────
const thread = document.getElementById('chatThread');

function addMessage(role, text, opts = {}) {
  const m = document.createElement('div');
  m.className = 'msg ' + role + (opts.typing ? ' typing' : '');
  if (opts.typing) {
    m.innerHTML = `
      <div class="who"><span class="pip-mini"></span>Aurora</div>
      <div class="bubble"><i></i><i></i><i></i></div>
    `;
  } else {
    m.innerHTML = `
      <div class="who">${role === 'ai' ? '<span class="pip-mini"></span>Aurora' : 'You'}</div>
      <div class="bubble">${text}</div>
    `;
  }
  thread.appendChild(m);
  // keep only last 8 messages visible
  while (thread.children.length > 8) thread.removeChild(thread.firstChild);
  thread.scrollTop = thread.scrollHeight;
  return m;
}

// Simulated AI replies
const REPLIES = {
  default: [
    "On it. Here's what I'm pulling together right now.",
    "Got it — let me think through that.",
    "Yes — give me a second to surface the right pieces.",
    "Reading the field. Standing by to act.",
  ],
  weather: "It's 23° in London right now, partly clouded with a light south-west breeze. Feels closer to 21°. Tomorrow you'll wake up to clear skies and 19°.",
  evening: "For tonight in Soho I'd suggest 19:30 dinner at Quo Vadis, then a short walk to Ronnie Scott's for the 21:30 set. Want me to hold both?",
  tokyo:   "Tokyo trip — flights from LHR are running £612 in late June, hotels in Shibuya from £180/night. Want me to draft a 5-day itinerary around the Tsukiji morning?",
};
function pickReply(input) {
  const q = input.toLowerCase();
  if (q.includes('weather') || q.includes('temperature') || q.includes('rain')) return REPLIES.weather;
  if (q.includes('evening') || q.includes('dinner') || q.includes('soho'))      return REPLIES.evening;
  if (q.includes('tokyo')   || q.includes('japan')   || q.includes('flight'))   return REPLIES.tokyo;
  return REPLIES.default[Math.floor(Math.random() * REPLIES.default.length)];
}

function send() {
  const v = input.value.trim();
  if (!v) return;
  // First send → enter focus mode. Disables stars, shrinks dots, dims field.
  if (!document.body.classList.contains('focus-mode')) {
    document.body.classList.add('focus-mode');
  }
  // Wave: ripples from all four directions + a local stereo pulse at the bar.
  const rect = input.getBoundingClientRect();
  if (window.Aurora) {
    window.Aurora.pulseFromAll(0.7);
    window.Aurora.pulse(rect.left + rect.width / 2, rect.top + rect.height / 2, 0.7);
    window.Aurora.spark(rect.left + rect.width / 2, rect.top + rect.height / 2, 10);
  }
  // history rail
  conversations.forEach(x => x.active = false);
  conversations.unshift({ title: v.slice(0, 40), when: 'now', active: true, group: 'today' });
  renderHistory();
  // push user message
  addMessage('user', v);
  input.value = '';
  // AI typing then reply
  const typing = addMessage('ai', '', { typing: true });
  setTimeout(() => {
    typing.remove();
    const reply = pickReply(v);
    addMessage('ai', reply);
    // AI reply: waves ripple inward from every direction
    if (window.Aurora) {
      window.Aurora.pulseFromAll(0.45);
    }
  }, 900 + Math.random() * 600);
}
sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); send(); }
});
// While typing, calm down the dot field so it doesn't compete with input.
input.addEventListener('focus', () => document.body.classList.add('typing'));
input.addEventListener('blur',  () => document.body.classList.remove('typing'));

// ─── Live clock + meta day ────────────────────────────────────────────────
function tickClock() {
  const d = new Date();
  const days   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const wkLong = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const monthsLong = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayLong = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${days[d.getDay()]} · ${hh}:${mm}`;
  document.getElementById('metaDay').textContent = `${wkLong[d.getDay()]} · ${d.getDate()} ${months[d.getMonth()]}`;

}
tickClock();
setInterval(tickClock, 30 * 1000);

</script>
